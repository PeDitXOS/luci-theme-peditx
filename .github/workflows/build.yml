name: Release PeDitX Packages (Auto-Version from Source)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  TZ: Asia/Tehran
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Target Repo (PeDitXOS)
        uses: actions/checkout@v4
        
      - name: Clone External Sources (peditx org)
        run: |
          mkdir -p src_projects
          git clone https://github.com/peditx/luci-theme-peditx.git src_projects/luci-theme-peditx
          git clone https://github.com/peditx/luci-theme-carbonpx.git src_projects/luci-theme-carbonpx
          git clone https://github.com/peditx/luci-app-themeswitch.git src_projects/luci-app-themeswitch

      - name: Extract Version from Cloned Makefile
        id: get_version
        run: |
          VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' src_projects/luci-theme-peditx/Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ Detected Version from Source: v$VERSION"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext unzip zlib1g-dev file python3 curl wget zstd

      # ================= BUILD IPK (SDK 23.05) =================
      - name: Build IPK Packages
        run: |
          wget http://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk_ipk.tar.xz
          mkdir sdk_ipk && tar -xJf sdk_ipk.tar.xz -C sdk_ipk --strip-components=1
          cd sdk_ipk
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          for proj in "${projects[@]}"; do
            mkdir -p package/$proj
            cp -r ../src_projects/$proj/* package/$proj/
            echo -e "CONFIG_PACKAGE_$proj=m\nCONFIG_LUCI_JSMIN=n\nCONFIG_LUCI_CSSTIDY=n" >> .config
          done
          
          make defconfig
          for proj in "${projects[@]}"; do
            make package/$proj/compile -j$(nproc) V=s || true
          done
          
          mkdir -p ../artifacts/ipk
          find bin/ -type f -name "*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true

      # ================= BUILD APK (SDK 25.12) =================
      - name: Build APK Packages
        run: |
          wget http://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst -O sdk_apk.tar.zst
          zstd -d sdk_apk.tar.zst && tar -xf sdk_apk.tar -C sdk_apk --strip-components=1
          cd sdk_apk
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          projects=("luci-theme-peditx" "luci-theme-carbonpx" "luci-app-themeswitch")
          for proj in "${projects[@]}"; do
            mkdir -p package/$proj
            cp -r ../src_projects/$proj/* package/$proj/
            echo -e "CONFIG_PACKAGE_$proj=m\nCONFIG_LUCI_JSMIN=n\nCONFIG_LUCI_CSSTIDY=n" >> .config
          done
          
          make defconfig
          for proj in "${projects[@]}"; do
            make package/$proj/compile -j$(nproc) V=s || true
          done
          
          mkdir -p ../artifacts/apk
          find bin/ -type f -name "*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true

      # ================= RELEASE WITH AUTO-DETECTED VERSION =================
      - name: Publish to Current Repo Releases
        uses: softprops/action-gh-release@v2
        if: ${{ hashFiles('artifacts/**') != '' }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "PeDitX OS Packages ${{ steps.get_version.outputs.version }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
