name: Release PeDitX Theme Only

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  TZ: Asia/Tehran
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build & Release PeDitX Theme
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Target Repo (PeDitXOS)
        uses: actions/checkout@v4
        
      - name: Clone PeDitX Theme Source Only
        run: |
          mkdir -p src_projects
          git clone https://github.com/peditx/luci-theme-peditx.git src_projects/luci-theme-peditx

      - name: Extract Version from Cloned Makefile
        id: get_version
        run: |
          VERSION=$(grep -E 'PKG_VERSION\s*:=\s*' src_projects/luci-theme-peditx/Makefile | sed -E 's/PKG_VERSION\s*:=\s*//' | tr -d ' \n\r')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ Detected Version: v$VERSION"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext unzip zlib1g-dev file python3 curl wget zstd

      # ================= BUILD IPK (SDK 23.05) =================
      - name: Build IPK Package
        run: |
          wget http://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk_ipk.tar.xz
          mkdir -p sdk_ipk && tar -xJf sdk_ipk.tar.xz -C sdk_ipk --strip-components=1
          cd sdk_ipk
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          mkdir -p package/luci-theme-peditx
          cp -r ../src_projects/luci-theme-peditx/* package/luci-theme-peditx/
          
          echo -e "CONFIG_PACKAGE_luci-theme-peditx=m\nCONFIG_LUCI_JSMIN=n\nCONFIG_LUCI_CSSTIDY=n" >> .config
          make defconfig
          make package/luci-theme-peditx/compile -j$(nproc) V=s || true
          
          mkdir -p ../artifacts/ipk
          find bin/ -type f -name "*.ipk" -exec cp {} ../artifacts/ipk/ \; 2>/dev/null || true

      # ================= BUILD APK (SDK 25.12) =================
      - name: Build APK Package
        run: |
          wget http://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst -O sdk_apk.tar.zst
          mkdir -p sdk_apk
          tar --use-compress-program=unzstd -xf sdk_apk.tar.zst -C sdk_apk --strip-components=1
          
          cd sdk_apk
          ./scripts/feeds update -a && ./scripts/feeds install -a
          
          mkdir -p package/luci-theme-peditx
          cp -r ../src_projects/luci-theme-peditx/* package/luci-theme-peditx/
          
          echo -e "CONFIG_PACKAGE_luci-theme-peditx=m\nCONFIG_LUCI_JSMIN=n\nCONFIG_LUCI_CSSTIDY=n" >> .config
          make defconfig
          make package/luci-theme-peditx/compile -j$(nproc) V=s || true
          
          mkdir -p ../artifacts/apk
          find bin/ -type f -name "*.apk" -exec cp {} ../artifacts/apk/ \; 2>/dev/null || true

      # ================= RELEASE =================
      - name: Publish to Current Repo Releases
        uses: softprops/action-gh-release@v2
        if: ${{ hashFiles('artifacts/**') != '' }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "PeDitX Theme ${{ steps.get_version.outputs.version }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
